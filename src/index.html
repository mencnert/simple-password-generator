<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Website to generate passwords locally" />
    <title>Simple password generator</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        font-size: 18px;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        padding: 24px;
      }

      #root {
        width: 100%;
        max-width: 480px;
      }

      .card {
        background: #ffffff;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      }

      h1 {
        margin: 0 0 24px;
        font-size: 1.6em;
        text-align: center;
        color: #1f2937;
      }

      .field {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 0;
        border-bottom: 1px solid #e5e7eb;
      }

      .field label {
        color: #374151;
        font-weight: 500;
      }

      .field input[type="number"] {
        width: 90px;
        font-size: 1em;
        padding: 8px 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
      }

      .field input[type="checkbox"] {
        width: 24px;
        height: 24px;
        accent-color: #4f46e5;
        cursor: pointer;
      }

      #passId {
        width: 100%;
        margin-top: 24px;
        padding: 14px 16px;
        font-size: 1.1em;
        font-family: "SFMono-Regular", Consolas, Menlo, monospace;
        letter-spacing: 0.5px;
        text-align: center;
        border: 2px solid #4f46e5;
        border-radius: 10px;
        color: #1f2937;
        background: #f5f3ff;
      }

      .buttons {
        display: flex;
        gap: 12px;
        margin-top: 20px;
      }

      button {
        flex: 1;
        font-size: 1em;
        font-weight: 600;
        padding: 14px 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition:
          transform 0.05s ease,
          opacity 0.15s ease;
      }

      button:active {
        transform: scale(0.97);
      }

      button:first-of-type {
        background: #4f46e5;
        color: #ffffff;
      }

      button:first-of-type:hover {
        background: #4338ca;
      }

      button:last-of-type {
        background: #e5e7eb;
        color: #1f2937;
      }

      button:last-of-type:hover {
        background: #d1d5db;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div class="card">
        <h1>Simple Password Generator</h1>

        <div class="field">
          <label>Password length:</label>
          <input id="passLen" type="number" />
        </div>

        <div class="field">
          <label>Lowercase chars:</label>
          <input id="lowerCaseChars" type="checkbox" />
        </div>

        <div class="field">
          <label>Uppercase chars:</label>
          <input id="upperCaseChars" type="checkbox" />
        </div>

        <div class="field">
          <label>Number chars:</label>
          <input id="numberChars" type="checkbox" />
        </div>

        <div class="field">
          <label>Special chars:</label>
          <input id="specialChars" type="checkbox" />
        </div>

        <input id="passId" type="text" readonly />

        <div class="buttons">
          <button onClick="setNewPassword()">New password</button>
          <button onClick="copyToClipboard()">Copy to clipboard</button>
        </div>
      </div>
    </div>
    <script>
      const DEFAULT_PASS_LEN = 20;
      const DEFAULT_LOWER_CASE_CHARS = true;
      const DEFAULT_UPPER_CASE_CHARS = true;
      const DEFAULT_NUMBER_CHARS = true;
      const DEFAULT_SPECIAL_CHARS = true;

      /**
       *
       * @param  {number} passLength
       * @param {boolean} includeLowerCase
       * @param {boolean} includeUpperCase
       * @param {boolean} includeNumbers
       * @param {boolean} includeSpecialChars
       * @returns {string}
       */
      function generatePassword(
        passLength,
        includeLowerCase,
        includeUpperCase,
        includeNumbers,
        includeSpecialChars,
      ) {
        const specialCharSet = "!#$%&()*+,-.:;<=>?@[]^_{|}~";
        const upperCaseAlphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const lowerCaseAlphabet = "abcdefghijklmnopqrstuvwxyz";
        const numberCharSet = "0123456789";

        let charSet = "";
        charSet += includeLowerCase ? lowerCaseAlphabet : "";
        charSet += includeUpperCase ? upperCaseAlphabet : "";
        charSet += includeNumbers ? numberCharSet : "";
        charSet += includeSpecialChars ? specialCharSet : "";

        if (charSet.length === 0) {
          return "";
        }

        let result = "";
        for (let i = 0; i < passLength; i++) {
          result += charSet.charAt(Math.floor(Math.random() * charSet.length));
        }
        return result;
      }

      function copyToClipboard() {
        const input = document.getElementById("passId");
        const text = input.value;
        input.select();
        if (window.clipboardData && window.clipboardData.setData) {
          return window.clipboardData.setData("Text", text);
        } else if (
          document.queryCommandSupported &&
          document.queryCommandSupported("copy")
        ) {
          try {
            return document.execCommand("copy");
          } catch (ex) {
            console.warn("Copy to clipboard failed.", ex);
            return false;
          }
        }
      }

      function getNewPassword() {
        const passLen = document.getElementById("passLen").value;
        const lowerCaseChars =
          document.getElementById("lowerCaseChars").checked;
        const upperCaseChars =
          document.getElementById("upperCaseChars").checked;
        const numberChars = document.getElementById("numberChars").checked;
        const specialChars = document.getElementById("specialChars").checked;

        return generatePassword(
          passLen,
          lowerCaseChars,
          upperCaseChars,
          numberChars,
          specialChars,
        );
      }

      function setNewPassword() {
        document.getElementById("passId").value = getNewPassword();
      }

      document.getElementById("passLen").value = DEFAULT_PASS_LEN;
      document.getElementById("lowerCaseChars").checked =
        DEFAULT_LOWER_CASE_CHARS;
      document.getElementById("upperCaseChars").checked =
        DEFAULT_UPPER_CASE_CHARS;
      document.getElementById("numberChars").checked = DEFAULT_NUMBER_CHARS;
      document.getElementById("specialChars").checked = DEFAULT_SPECIAL_CHARS;

      document.getElementById("passId").value = getNewPassword();
    </script>
  </body>
</html>
