<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web pro generování hesel lokálně v prohlížeči"
    />
    <title>Generátor hesel</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        font-size: 18px;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        padding: 24px;
      }

      #root {
        width: 100%;
        max-width: 480px;
      }

      .card {
        background: #ffffff;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      }

      h1 {
        margin: 0 0 24px;
        font-size: 1.6em;
        text-align: center;
        color: #1f2937;
      }

      #langSwitcher {
        display: block;
        margin: 0 0 16px auto;
        padding: 6px 10px;
        font-size: 0.9em;
        color: #374151;
        background: #ffffff;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        cursor: pointer;
        color-scheme: light;
      }

      .field {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 0;
        border-bottom: 1px solid #e5e7eb;
      }

      .field label {
        color: #374151;
        font-weight: 500;
      }

      .field input[type="number"] {
        width: 90px;
        font-size: 1em;
        padding: 8px 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
      }

      .length-control {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
        min-width: 0;
      }

      .length-control input[type="range"] {
        flex: 1;
        min-width: 0;
        accent-color: #4f46e5;
        cursor: pointer;
      }

      .length-control input[type="number"] {
        width: 56px;
        flex: 0 0 auto;
        text-align: center;
        padding: 8px 6px;
      }

      .field input[type="checkbox"] {
        width: 24px;
        height: 24px;
        accent-color: #4f46e5;
        cursor: pointer;
      }

      #passId {
        width: 100%;
        margin-top: 24px;
        padding: 14px 16px;
        font-size: 1.1em;
        font-family: "SFMono-Regular", Consolas, Menlo, monospace;
        letter-spacing: 0.5px;
        text-align: center;
        border: 2px solid #4f46e5;
        border-radius: 10px;
        color: #1f2937;
        background: #f5f3ff;
      }

      .strength-info {
        padding: 12px 0;
        border-bottom: 1px solid #e5e7eb;
      }

      .strength-meter {
        height: 8px;
        border-radius: 4px;
        background: #e5e7eb;
        overflow: hidden;
        margin-bottom: 12px;
      }

      .strength-meter-fill {
        height: 100%;
        width: 0%;
        border-radius: 4px;
        background: #d1d5db;
        transition:
          width 0.2s ease,
          background 0.2s ease;
      }

      .strength-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        color: #374151;
        font-size: 0.85em;
        padding: 2px 0;
      }

      .strength-row > span:first-child {
        font-weight: 500;
      }

      .strength-row > span:last-child {
        color: #1f2937;
        font-weight: 600;
        text-align: right;
      }

      .strength-label-group {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .info-icon {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #d1d5db;
        color: #374151;
        font-size: 0.7em;
        font-weight: 700;
        line-height: 1;
        cursor: help;
      }

      .info-icon .tooltip {
        position: absolute;
        bottom: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%);
        width: max-content;
        max-width: 220px;
        background: #1f2937;
        color: #ffffff;
        font-size: 1.15em;
        font-weight: 400;
        line-height: 1.5;
        padding: 8px 10px;
        border-radius: 8px;
        text-align: left;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s ease;
        z-index: 10;
      }

      .tooltip-row {
        display: block;
      }

      .info-icon:hover .tooltip,
      .info-icon:focus .tooltip,
      .info-icon:focus-visible .tooltip {
        opacity: 1;
      }

      .buttons {
        display: flex;
        gap: 12px;
        margin-top: 20px;
      }

      button {
        flex: 1;
        font-size: 1em;
        font-weight: 600;
        padding: 14px 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition:
          transform 0.05s ease,
          opacity 0.15s ease;
      }

      button:active {
        transform: scale(0.97);
      }

      button:first-of-type {
        background: #4f46e5;
        color: #ffffff;
      }

      button:first-of-type:hover {
        background: #4338ca;
      }

      button:last-of-type {
        background: #e5e7eb;
        color: #1f2937;
      }

      button:last-of-type:hover {
        background: #d1d5db;
      }

      #copyBtn.copied,
      #copyBtn.copied:hover {
        background: #16a34a;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <noscript data-i18n="noscript">
      Pro spuštění této aplikace musíte povolit JavaScript.
    </noscript>
    <div id="root">
      <div class="card">
        <select
          id="langSwitcher"
          onchange="applyLanguage(this.value)"
          aria-label="Language / Jazyk"
        >
          <option value="cs">Čeština</option>
          <option value="en">English</option>
        </select>

        <h1 data-i18n="heading">Generátor hesel</h1>

        <div class="field length-field">
          <label for="passLen" data-i18n="passwordLength">Délka hesla:</label>
          <div class="length-control">
            <input id="passLenSlider" type="range" min="1" max="100" step="1" />
            <input id="passLen" type="number" min="1" max="100" step="1" />
          </div>
        </div>

        <div class="field">
          <label for="lowerCaseChars" data-i18n="lowerCaseChars"
            >Malá písmena:</label
          >
          <input id="lowerCaseChars" type="checkbox" />
        </div>

        <div class="field">
          <label for="upperCaseChars" data-i18n="upperCaseChars"
            >Velká písmena:</label
          >
          <input id="upperCaseChars" type="checkbox" />
        </div>

        <div class="field">
          <label for="numberChars" data-i18n="numberChars">Číslice:</label>
          <input id="numberChars" type="checkbox" />
        </div>

        <div class="field">
          <label for="specialChars" data-i18n="specialChars"
            >Speciální znaky:</label
          >
          <input id="specialChars" type="checkbox" />
        </div>

        <div class="strength-info">
          <div class="strength-meter">
            <div id="strengthMeterFill" class="strength-meter-fill"></div>
          </div>
          <div class="strength-row">
            <span class="strength-label-group">
              <span data-i18n="strengthTierLabel">Síla hesla:</span>
              <span class="info-icon" tabindex="0" aria-describedby="strengthTooltip"
                >ⓘ
                <span class="tooltip" id="strengthTooltip" role="tooltip">
                  <span class="tooltip-row">
                    <span data-i18n="combinationsLabel"
                      >Možných kombinací:</span
                    >
                    <span id="combinationsValue"></span>
                  </span>
                  <span class="tooltip-row">
                    <span data-i18n="crackTimeLabel"
                      >Odhadovaný čas na prolomení:</span
                    >
                    <span id="crackTimeValue"></span>
                  </span>
                </span>
              </span>
            </span>
            <span id="strengthTierValue"></span>
          </div>
        </div>

        <input id="passId" type="text" readonly />

        <div class="buttons">
          <button data-i18n="newPassword" onClick="setNewPassword()">
            Nové heslo
          </button>
          <button
            id="copyBtn"
            data-i18n="copyToClipboard"
            onClick="copyToClipboard()"
          >
            Kopírovat
          </button>
        </div>
      </div>
    </div>
    <script>
      const DEFAULT_PASS_LEN = 20;
      const MIN_PASS_LEN = 1;
      const MAX_PASS_LEN = 100;
      const DEFAULT_LOWER_CASE_CHARS = true;
      const DEFAULT_UPPER_CASE_CHARS = true;
      const DEFAULT_NUMBER_CHARS = true;
      const DEFAULT_SPECIAL_CHARS = true;

      const LANG_STORAGE_KEY = "lang";
      const DEFAULT_LANG = "cs";

      const translations = {
        en: {
          pageTitle: "Simple password generator",
          metaDescription: "Website to generate passwords locally",
          noscript: "You need to enable JavaScript to run this app.",
          heading: "Simple Password Generator",
          passwordLength: "Password length:",
          lowerCaseChars: "Lowercase chars:",
          upperCaseChars: "Uppercase chars:",
          numberChars: "Number chars:",
          specialChars: "Special chars:",
          strengthTierLabel: "Password strength:",
          combinationsLabel: "Possible combinations:",
          crackTimeLabel: "Estimated time to crack:",
          tierVeryWeak: "Very weak",
          tierWeak: "Weak",
          tierFair: "Fair",
          tierStrong: "Strong",
          tierVeryStrong: "Very strong",
          timeUnitSeconds: "seconds",
          timeUnitMinutes: "minutes",
          timeUnitHours: "hours",
          timeUnitDays: "days",
          timeUnitYears: "years",
          crackTimeLessThanOne: "instantly",
          crackTimeSciFormat: "~{value} {unit}",
          noCharSetSelected: "Select at least one character type",
          newPassword: "New password",
          copyToClipboard: "Copy",
          copied: "✓ Copied!",
        },
        cs: {
          pageTitle: "Generátor hesel",
          metaDescription: "Web pro generování hesel lokálně v prohlížeči",
          noscript: "Pro spuštění této aplikace musíte povolit JavaScript.",
          heading: "Generátor hesel",
          passwordLength: "Délka hesla:",
          lowerCaseChars: "Malá písmena:",
          upperCaseChars: "Velká písmena:",
          numberChars: "Číslice:",
          specialChars: "Speciální znaky:",
          strengthTierLabel: "Síla hesla:",
          combinationsLabel: "Možných kombinací:",
          crackTimeLabel: "Odhadovaný čas na prolomení:",
          tierVeryWeak: "Velmi slabé",
          tierWeak: "Slabé",
          tierFair: "Ucházející",
          tierStrong: "Silné",
          tierVeryStrong: "Velmi silné",
          timeUnitSeconds: "sekund",
          timeUnitMinutes: "minut",
          timeUnitHours: "hodin",
          timeUnitDays: "dní",
          timeUnitYears: "let",
          crackTimeLessThanOne: "okamžitě",
          crackTimeSciFormat: "~{value} {unit}",
          noCharSetSelected: "Vyberte alespoň jeden typ znaků",
          newPassword: "Nové heslo",
          copyToClipboard: "Kopírovat",
          copied: "✓ Zkopírováno!",
        },
      };

      let currentLang = DEFAULT_LANG;
      let copyFeedbackTimeout = null;

      function getInitialLanguage() {
        const stored = localStorage.getItem(LANG_STORAGE_KEY);
        return stored === "en" || stored === "cs" ? stored : DEFAULT_LANG;
      }

      function applyLanguage(lang) {
        const dict = translations[lang] || translations[DEFAULT_LANG];
        currentLang = translations[lang] ? lang : DEFAULT_LANG;

        document.documentElement.lang = lang;
        document.title = dict.pageTitle;

        const metaDescription = document.querySelector(
          'meta[name="description"]',
        );
        if (metaDescription) {
          metaDescription.setAttribute("content", dict.metaDescription);
        }

        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          if (dict[key]) {
            el.textContent = dict[key];
          }
        });

        document.getElementById("langSwitcher").value = lang;
        localStorage.setItem(LANG_STORAGE_KEY, lang);

        updateStrengthInfo();
      }

      /**
       *
       * @param  {number} passLength
       * @param {boolean} includeLowerCase
       * @param {boolean} includeUpperCase
       * @param {boolean} includeNumbers
       * @param {boolean} includeSpecialChars
       * @returns {string}
       */
      function generatePassword(
        passLength,
        includeLowerCase,
        includeUpperCase,
        includeNumbers,
        includeSpecialChars,
      ) {
        const specialCharSet = "!#$%&()*+,-.:;<=>?@[]^_{|}~";
        const upperCaseAlphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const lowerCaseAlphabet = "abcdefghijklmnopqrstuvwxyz";
        const numberCharSet = "0123456789";

        let charSet = "";
        charSet += includeLowerCase ? lowerCaseAlphabet : "";
        charSet += includeUpperCase ? upperCaseAlphabet : "";
        charSet += includeNumbers ? numberCharSet : "";
        charSet += includeSpecialChars ? specialCharSet : "";

        if (charSet.length === 0) {
          return "";
        }

        let result = "";
        for (let i = 0; i < passLength; i++) {
          result += charSet.charAt(Math.floor(Math.random() * charSet.length));
        }
        return result;
      }

      const CRACK_RATE_GUESSES_PER_SEC = 1e10;
      const CRACK_TIME_SCI_NOTATION_THRESHOLD_YEARS = 10000;
      const METER_MAX_BITS = 128;

      const STRENGTH_TIERS = [
        { key: "tierVeryWeak", maxBits: 28 },
        { key: "tierWeak", maxBits: 36 },
        { key: "tierFair", maxBits: 60 },
        { key: "tierStrong", maxBits: 128 },
        { key: "tierVeryStrong", maxBits: Infinity },
      ];

      const TIER_COLORS = {
        tierVeryWeak: "#dc2626",
        tierWeak: "#f97316",
        tierFair: "#eab308",
        tierStrong: "#65a30d",
        tierVeryStrong: "#16a34a",
      };

      /**
       * @param {boolean} includeLowerCase
       * @param {boolean} includeUpperCase
       * @param {boolean} includeNumbers
       * @param {boolean} includeSpecialChars
       * @returns {number}
       */
      function getCharSetSize(
        includeLowerCase,
        includeUpperCase,
        includeNumbers,
        includeSpecialChars,
      ) {
        let size = 0;
        size += includeLowerCase ? 26 : 0;
        size += includeUpperCase ? 26 : 0;
        size += includeNumbers ? 10 : 0;
        size += includeSpecialChars ? 28 : 0;
        return size;
      }

      /**
       * @param {number} passLength
       * @param {number} charSetSize
       * @returns {number}
       */
      function calculateCombinations(passLength, charSetSize) {
        if (charSetSize <= 0 || passLength <= 0) {
          return 0;
        }
        return Math.pow(charSetSize, passLength);
      }

      /**
       * @param {number} passLength
       * @param {number} charSetSize
       * @returns {number}
       */
      function calculateEntropyBits(passLength, charSetSize) {
        if (charSetSize <= 0) {
          return -Infinity;
        }
        return passLength * Math.log2(charSetSize);
      }

      /**
       * @param {number} bits
       * @returns {string|null}
       */
      function classifyStrengthTier(bits) {
        if (!Number.isFinite(bits)) {
          return null;
        }
        for (const tier of STRENGTH_TIERS) {
          if (bits < tier.maxBits) {
            return tier.key;
          }
        }
        return STRENGTH_TIERS[STRENGTH_TIERS.length - 1].key;
      }

      /**
       * @param {number} combinations
       * @returns {number}
       */
      function calculateCrackTimeSeconds(combinations) {
        if (!Number.isFinite(combinations) || combinations <= 0) {
          return 0;
        }
        return combinations / (2 * CRACK_RATE_GUESSES_PER_SEC);
      }

      /**
       * @param {number} combinations
       * @returns {string}
       */
      function formatCombinations(combinations) {
        if (combinations <= 0 || !Number.isFinite(combinations)) {
          return "0";
        }
        if (combinations < 1000) {
          return String(Math.round(combinations));
        }
        const exponent = Math.floor(Math.log10(combinations));
        let mantissa = combinations / Math.pow(10, exponent);
        let roundedMantissa = Math.round(mantissa * 100) / 100;
        let finalExponent = exponent;
        if (roundedMantissa >= 10) {
          roundedMantissa = roundedMantissa / 10;
          finalExponent += 1;
        }
        return `${roundedMantissa.toFixed(2)} × 10^${finalExponent}`;
      }

      /**
       * @param {number} seconds
       * @returns {{value?: number, unitKey?: string, lessThanOne?: boolean, sciYears?: string}}
       */
      function formatCrackTime(seconds) {
        const SECONDS_PER_MINUTE = 60;
        const SECONDS_PER_HOUR = 3600;
        const SECONDS_PER_DAY = 86400;
        const SECONDS_PER_YEAR = 31557600;

        if (seconds < 1) {
          return { lessThanOne: true };
        }
        if (seconds < SECONDS_PER_MINUTE) {
          return { value: Math.round(seconds), unitKey: "timeUnitSeconds" };
        }
        if (seconds < SECONDS_PER_HOUR) {
          return {
            value: Math.round(seconds / SECONDS_PER_MINUTE),
            unitKey: "timeUnitMinutes",
          };
        }
        if (seconds < SECONDS_PER_DAY) {
          return {
            value: Math.round(seconds / SECONDS_PER_HOUR),
            unitKey: "timeUnitHours",
          };
        }
        if (seconds < SECONDS_PER_YEAR) {
          return {
            value: Math.round(seconds / SECONDS_PER_DAY),
            unitKey: "timeUnitDays",
          };
        }

        const years = seconds / SECONDS_PER_YEAR;
        if (years > CRACK_TIME_SCI_NOTATION_THRESHOLD_YEARS) {
          return { sciYears: formatCombinations(years) };
        }
        return { value: Math.round(years), unitKey: "timeUnitYears" };
      }

      function updateStrengthInfo() {
        const passLen =
          parseInt(document.getElementById("passLen").value, 10) || 0;
        const lowerCaseChars =
          document.getElementById("lowerCaseChars").checked;
        const upperCaseChars =
          document.getElementById("upperCaseChars").checked;
        const numberChars = document.getElementById("numberChars").checked;
        const specialChars = document.getElementById("specialChars").checked;
        const dict = translations[currentLang] || translations[DEFAULT_LANG];

        const charSetSize = getCharSetSize(
          lowerCaseChars,
          upperCaseChars,
          numberChars,
          specialChars,
        );

        const combinationsEl = document.getElementById("combinationsValue");
        const crackTimeEl = document.getElementById("crackTimeValue");
        const meterFillEl = document.getElementById("strengthMeterFill");
        const tierValueEl = document.getElementById("strengthTierValue");

        if (charSetSize === 0 || passLen <= 0) {
          combinationsEl.textContent = dict.noCharSetSelected;
          crackTimeEl.textContent = dict.noCharSetSelected;
          tierValueEl.textContent = dict.noCharSetSelected;
          meterFillEl.style.width = "0%";
          meterFillEl.style.background = "#d1d5db";
          return;
        }

        const combinations = calculateCombinations(passLen, charSetSize);
        const bits = calculateEntropyBits(passLen, charSetSize);
        const tierKey = classifyStrengthTier(bits);
        const crackSeconds = calculateCrackTimeSeconds(combinations);
        const crackTimeParts = formatCrackTime(crackSeconds);

        combinationsEl.textContent = formatCombinations(combinations);
        tierValueEl.textContent = dict[tierKey];

        if (crackTimeParts.sciYears) {
          crackTimeEl.textContent = dict.crackTimeSciFormat
            .replace("{value}", crackTimeParts.sciYears)
            .replace("{unit}", dict.timeUnitYears);
        } else if (crackTimeParts.lessThanOne) {
          crackTimeEl.textContent = dict.crackTimeLessThanOne;
        } else {
          crackTimeEl.textContent = `${crackTimeParts.value} ${dict[crackTimeParts.unitKey]}`;
        }

        const meterPct = Math.min(100, (bits / METER_MAX_BITS) * 100);
        meterFillEl.style.width = `${meterPct}%`;
        meterFillEl.style.background = TIER_COLORS[tierKey];
      }

      function showCopiedFeedback() {
        const button = document.getElementById("copyBtn");
        const dict = translations[currentLang] || translations[DEFAULT_LANG];

        clearTimeout(copyFeedbackTimeout);
        button.textContent = dict.copied;
        button.classList.add("copied");
        copyFeedbackTimeout = setTimeout(() => {
          button.textContent = dict.copyToClipboard;
          button.classList.remove("copied");
        }, 3000);
      }

      async function copyToClipboard() {
        const input = document.getElementById("passId");
        const text = input.value;
        let success = false;

        if (navigator.clipboard && navigator.clipboard.writeText) {
          try {
            await navigator.clipboard.writeText(text);
            success = true;
          } catch (ex) {
            console.warn("Copy to clipboard failed.", ex);
          }
        }

        if (!success) {
          input.select();
          if (window.clipboardData && window.clipboardData.setData) {
            success = window.clipboardData.setData("Text", text);
          } else if (
            document.queryCommandSupported &&
            document.queryCommandSupported("copy")
          ) {
            try {
              success = document.execCommand("copy");
            } catch (ex) {
              console.warn("Copy to clipboard failed.", ex);
            }
          }
        }

        if (success) {
          showCopiedFeedback();
        }

        return success;
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function syncPassLenFromSlider() {
        document.getElementById("passLen").value =
          document.getElementById("passLenSlider").value;
      }

      function syncPassLenFromNumber() {
        const numberInput = document.getElementById("passLen");
        const raw = parseInt(numberInput.value, 10);
        if (Number.isNaN(raw)) {
          return;
        }
        const clamped = clamp(raw, MIN_PASS_LEN, MAX_PASS_LEN);
        if (clamped !== raw) {
          numberInput.value = clamped;
        }
        document.getElementById("passLenSlider").value = clamped;
      }

      function getNewPassword() {
        const passLen = document.getElementById("passLen").value;
        const lowerCaseChars =
          document.getElementById("lowerCaseChars").checked;
        const upperCaseChars =
          document.getElementById("upperCaseChars").checked;
        const numberChars = document.getElementById("numberChars").checked;
        const specialChars = document.getElementById("specialChars").checked;

        return generatePassword(
          passLen,
          lowerCaseChars,
          upperCaseChars,
          numberChars,
          specialChars,
        );
      }

      function setNewPassword() {
        document.getElementById("passId").value = getNewPassword();
      }

      applyLanguage(getInitialLanguage());

      document.getElementById("passLen").min = MIN_PASS_LEN;
      document.getElementById("passLen").max = MAX_PASS_LEN;
      document.getElementById("passLen").value = DEFAULT_PASS_LEN;
      document.getElementById("passLenSlider").min = MIN_PASS_LEN;
      document.getElementById("passLenSlider").max = MAX_PASS_LEN;
      document.getElementById("passLenSlider").value = DEFAULT_PASS_LEN;
      document
        .getElementById("passLenSlider")
        .addEventListener("input", syncPassLenFromSlider);
      document
        .getElementById("passLen")
        .addEventListener("input", syncPassLenFromNumber);
      document
        .getElementById("passLenSlider")
        .addEventListener("input", updateStrengthInfo);
      document
        .getElementById("passLen")
        .addEventListener("input", updateStrengthInfo);
      document.getElementById("lowerCaseChars").checked =
        DEFAULT_LOWER_CASE_CHARS;
      document.getElementById("upperCaseChars").checked =
        DEFAULT_UPPER_CASE_CHARS;
      document.getElementById("numberChars").checked = DEFAULT_NUMBER_CHARS;
      document.getElementById("specialChars").checked = DEFAULT_SPECIAL_CHARS;
      document
        .getElementById("lowerCaseChars")
        .addEventListener("change", updateStrengthInfo);
      document
